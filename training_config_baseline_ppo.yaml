# PVZ AI Baseline PPO Training Configuration
# Survival Day — same game setup as DDQN baseline, model changed to PPO
#
# Usage:
#   .\.venv\Scripts\python.exe train.py --training_config training_config_baseline_ppo.yaml

# =============================================================================
# Game Settings — Survival: Day (identical to DDQN baseline)
# =============================================================================
game:
  mode: "survival_day"           # 生存模式(白天)
  game_mode_id: 1                # GAMEMODE_SURVIVAL_NORMAL_STAGE_1 = 生存白天
  background_type: 0             # BACKGROUND_DAY
  map: "day"                     # 草地 (5 rows, no pool)
  rows: 5                        # 5 rows
  cols: 9                        # 9 columns
  initial_sun: 50

# =============================================================================
# Card Loadout — same as DDQN baseline (paper Table 4)
# =============================================================================
cards:
  slot_count: 10

  plants:
    # Slot 0: Sunflower (economy)
    - slot: 0
      id: 1
      name: "Sunflower"
      cost: 50

    # Slot 1: Peashooter (basic offense)
    - slot: 1
      id: 0
      name: "Peashooter"
      cost: 100

    # Slot 2: Potato Mine (trap)
    - slot: 2
      id: 4
      name: "Potato Mine"
      cost: 25

    # Slot 3: Wall-nut (defense)
    - slot: 3
      id: 3
      name: "Wall-nut"
      cost: 50

    # Slot 4: Repeater (double damage)
    - slot: 4
      id: 7
      name: "Repeater"
      cost: 200

    # Slot 5: Squash (instant kill)
    - slot: 5
      id: 17
      name: "Squash"
      cost: 50

    # Slot 6: Cherry Bomb (AOE instant)
    - slot: 6
      id: 2
      name: "Cherry Bomb"
      cost: 150

    # Slot 7: Snow Pea (slow)
    - slot: 7
      id: 5
      name: "Snow Pea"
      cost: 175

    # Slot 8: Melon-pult (AOE damage)
    - slot: 8
      id: 39
      name: "Melon-pult"
      cost: 300

    # Slot 9: Spikeweed (ground trap)
    - slot: 9
      id: 21
      name: "Spikeweed"
      cost: 100

# =============================================================================
# Action Space — 10 cards × 5 rows × 9 cols + 1 wait = 451
# =============================================================================
action_space:
  type: "discrete"
  size: 451

  structure:
    plant_actions: 450          # 10 cards × 45 cells
    shovel_actions: 0           # disabled
    wait_action: 1

# =============================================================================
# Observation Space — unified with DDQN baseline: 596-dim flat vector
# PVZEnv builds Dict obs internally → FlatPaperObsWrapper converts to 596-dim
# sun(1) + cooldowns(10) + plant_onehot(495) + plant_hp(45) + zombie_hp(45) = 596
# =============================================================================
observation_space:
  grid:
    shape: [5, 9, 13]           # internal PVZEnv grid
  global:
    total_dim: 65               # internal PVZEnv global
  card_attributes:
    shape: [10, 7]              # internal PVZEnv card_attr

# =============================================================================
# Reward — same sparse zombie-kill-only rewards as DDQN baseline
# =============================================================================
rewards:
  # Zombie kill rewards (sparse signal)
  zombie_kill:
    normal: 0.2                 # Basic Zombie
    conehead: 0.3               # Conehead Zombie
    buckethead: 0.6             # Buckethead Zombie
    pole_vaulter: 0.5           # Pole Vaulter Zombie
    football: 0.8               # Football Zombie
    gargantuar: 2.0             # Gargantuar
    default: 0.3                # Other zombie types

  coverage:
    scale: 0.0
  proximity:
    scale: 0.0

  # All auxiliary rewards set to 0 for sparse baseline
  sun_collect: 0.0
  wave_complete: 0.0
  game_win: 0.0
  streak_bonus: 0.0
  survival_per_step: 0.0
  plant_sunflower: 0.0
  plant_attacker: 0.0
  plant_wall: 0.0
  plant_lilypad: 0.0
  plant_pumpkin: 0.0
  plant_other: 0.0
  plant_lost: 0.0
  sunflower_lost: 0.0
  lawnmower_triggered: 0.0
  game_lose: 0.0
  invalid_action: 0.0
  wait_with_sun: 0.0

  potential:
    delta_scale: 0.0

# =============================================================================
# Training Configuration — PPO (same env, different algorithm)
# =============================================================================
training:
  args:
    algo: "ppo"
    port: 12345
    num_envs: 1
    base_port: 12345
    ports: ""
    pids: ""
    no_auto_start: false
    game_path: "gameobj/PlantsVsZombies.exe"
    wait_time: 3.0
    speed: 10.0
    frameskip: 24               # same as DDQN baseline
    no_auto_resume: false
    env_console_log_level: 0
    file_log_level: 1
    execution: "sb3_vec_env"    # PPO uses SB3 VecEnv
    curriculum: "none"

  ppo:
    timesteps: 8192000          # 4096 × 2000 = 8,192,000
    batch: 1024
    n_steps: 4096
    n_epochs: 20
    net: "xlarge"               # [2048, 1024, 512, 256] — comparable to DDQN [2048, 2048]
    lr: 0.0003
    start_ent: 0.15
    end_ent: 0.01
    ent_decay: "linear"         # linear exploration decay
    diversify: 0.0
    no_diversify: true
    no_failure_priority: false
    ppo_gamma: 0.99             # same as DDQN baseline
    save_freq: 100000           # save every 100K timesteps
    ppo_plot_freq: 50
    ppo_plot_path: null
    save_path: null
    load: null
    no_attn: false

  env:
    max_steps: 10000
